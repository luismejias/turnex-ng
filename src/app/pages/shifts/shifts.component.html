<div class="shifts">
  <div class="shifts__principal-box">
    <turnex-title [text]="'Turnos'"></turnex-title>

    <button class="shifts__new-shift-button" [routerLink]="['newShift']">
      <i class="fi-rr-plus-small"></i> Nuevo turno
    </button>
  </div>

  @if (activePack) {
    <div class="shifts__sub-title">
      <span>Pack activo: </span>
      <span class="shifts__pack-detail">{{ activePack }}</span>
    </div>
  }

  <div class="shifts__box">
    <div class="shifts__filters-box">
      <div
        class="shifts__button"
        [ngClass]="{ shifts__selected: filterSelected === typeShifts.NEXT }"
        (click)="onFilterSelected(typeShifts.NEXT)"
        (keyup)="onFilterSelected(typeShifts.NEXT)"
        role="button"
        tabindex="0">
        <span class="shifts__text">Próximos</span>
        <!-- @if (countByStatus(typeShifts.NEXT) > 0) {
          <span class="shifts__badge">{{ countByStatus(typeShifts.NEXT) }}</span>
        } -->
      </div>
      <div
        class="shifts__button"
        [ngClass]="{ shifts__selected: filterSelected === typeShifts.COMPLETED }"
        (click)="onFilterSelected(typeShifts.COMPLETED)"
        (keyup)="onFilterSelected(typeShifts.COMPLETED)"
        role="button"
        tabindex="0">
        <span class="shifts__text">Completados</span>
        <!-- @if (countByStatus(typeShifts.COMPLETED) > 0) {
          <span class="shifts__badge">{{ countByStatus(typeShifts.COMPLETED) }}</span>
        } -->
      </div>
      <div
        class="shifts__button"
        [ngClass]="{ shifts__selected: filterSelected === typeShifts.CANCELED }"
        (click)="onFilterSelected(typeShifts.CANCELED)"
        (keyup)="onFilterSelected(typeShifts.CANCELED)"
        role="button"
        tabindex="0">
        <span class="shifts__text">Cancelados</span>
        <!-- @if (countByStatus(typeShifts.CANCELED) > 0) {
          <span class="shifts__badge">{{ countByStatus(typeShifts.CANCELED) }}</span>
        } -->
      </div>
    </div>

    <div class="shifts__list">
      @if (isLoading) {
        <span class="shifts__empty">Cargando turnos...</span>
      } @else if (filteredShifts.length === 0) {
        <span class="shifts__empty">No tenés turnos en esta categoría.</span>
      } @else {
        @for (shift of filteredShifts; track shift.id) {
          <turnex-shift-card
            [shift]="shift"
            (cancelShift)="onCancelShift($event)"
            (rescheduleShift)="onRescheduleShift($event)">
          </turnex-shift-card>
        }
      }
    </div>
  </div>
</div>
